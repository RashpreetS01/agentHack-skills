---
# AgentHack-Skills — Port Scanning & Network Reconnaissance Lab
#
# ⚠️  EDUCATIONAL USE ONLY — Isolated internal network, no internet access

name: agentlab-port-scan-lab

services:
  target:
    build:
      context: .
      dockerfile: Dockerfile.target
    container_name: portscan-target
    networks:
      lab_net:
        ipv4_address: 172.22.0.2
        aliases:
          - target
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

  dns-sim:
    image: coredns/coredns:1.11.1
    container_name: portscan-dns
    volumes:
      - ./Corefile:/Corefile:ro
      - ./zones:/zones:ro
    networks:
      lab_net:
        ipv4_address: 172.22.0.10
        aliases:
          - ns1.acme-corp.lab
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

  attacker:
    image: instrumentisto/nmap:latest
    container_name: portscan-attacker
    entrypoint: /bin/sh
    command: -c "apk add --no-cache curl netcat-openbsd 2>/dev/null; tail -f /dev/null"
    networks:
      lab_net:
        ipv4_address: 172.22.0.100
        aliases:
          - attacker
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

networks:
  lab_net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.22.0.0/24
