name: Validate Skills

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate skills
        run: python scripts/validate_skills.py

      - name: Check safety disclaimers
        run: python scripts/check_safety.py

      - name: Regenerate index
        run: python scripts/generate_index.py

      - name: Verify index is up to date
        run: |
          git diff --exit-code index.json || (echo "index.json is stale - run python scripts/generate_index.py" && exit 1)
